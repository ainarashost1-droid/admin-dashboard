<style>
:root {
  --bg: #080808; --bg2: #0f0f0f; --bg3: #141414;
  --blue: #00D4FF; --blue2: rgba(0,212,255,0.1);
  --gold: #FFB800; --green: #00FF88; --red: #FF4444;
  --white: #F0F0F0; --gray: #555; --gray2: #222;
  --border: rgba(255,255,255,0.06);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--white);font-family:'Satoshi',sans-serif;min-height:100vh;display:flex;}
.sidebar{width:220px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:24px 0;flex-shrink:0;position:fixed;top:0;bottom:0;z-index:50;}
.sidebar-logo{padding:0 20px 28px;border-bottom:1px solid var(--border);margin-bottom:20px;}
.logo-text{font-family:'Clash Display',sans-serif;font-size:20px;font-weight:700;letter-spacing:0.1em;}
.logo-text span{color:var(--blue);}
.logo-sub{font-size:10px;letter-spacing:0.15em;text-transform:uppercase;color:var(--gray);margin-top:4px;}
.nav-section{padding:0 12px;margin-bottom:8px;}
.nav-label{font-size:10px;letter-spacing:0.15em;text-transform:uppercase;color:var(--gray);padding:0 8px;margin-bottom:8px;}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;cursor:pointer;transition:all 0.2s;font-size:13px;color:rgba(255,255,255,0.5);text-decoration:none;margin-bottom:2px;}
.nav-item:hover{background:rgba(255,255,255,0.04);color:var(--white);}
.nav-item.active{background:var(--blue2);color:var(--blue);border:1px solid rgba(0,212,255,0.15);}
.nav-icon{font-size:15px;width:20px;text-align:center;}
.nav-badge{margin-left:auto;background:var(--red);color:#fff;font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;}
.nav-badge.blue{background:var(--blue);color:var(--bg);}
.sidebar-bottom{margin-top:auto;padding:16px 12px;border-top:1px solid var(--border);}
.admin-card{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;background:rgba(255,255,255,0.03);}
.admin-avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--blue),#0088aa);display:flex;align-items:center;justify-content:center;font-family:'Clash Display',sans-serif;font-size:12px;font-weight:700;color:var(--bg);flex-shrink:0;}
.admin-name{font-size:12px;font-weight:500;}
.admin-role{font-size:10px;color:var(--gray);}
.main{margin-left:220px;flex:1;display:flex;flex-direction:column;min-height:100vh;}
.topbar{padding:20px 32px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--bg2);position:sticky;top:0;z-index:40;}
.topbar-left h1{font-family:'Clash Display',sans-serif;font-size:20px;font-weight:700;}
.topbar-left p{font-size:12px;color:var(--gray);margin-top:2px;}
.topbar-right{display:flex;align-items:center;gap:12px;}
.topbar-btn{background:var(--bg3);border:1px solid var(--border);color:var(--white);padding:9px 18px;border-radius:8px;font-family:'Satoshi',sans-serif;font-size:13px;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;gap:7px;}
.topbar-btn:hover{border-color:rgba(0,212,255,0.3);color:var(--blue);}
.topbar-btn.primary{background:var(--blue);color:var(--bg);border-color:var(--blue);font-weight:600;}
.topbar-btn.primary:hover{opacity:0.85;color:var(--bg);}
.content{padding:28px 32px;flex:1;}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:28px;}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:20px 24px;transition:border-color 0.3s;}
.stat-card:hover{border-color:rgba(0,212,255,0.2);}
.stat-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;}
.stat-icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;}
.stat-icon.blue{background:rgba(0,212,255,0.1);}
.stat-icon.green{background:rgba(0,255,136,0.1);}
.stat-icon.gold{background:rgba(255,184,0,0.1);}
.stat-icon.red{background:rgba(255,68,68,0.1);}
.stat-change{font-size:11px;padding:3px 8px;border-radius:6px;font-weight:600;}
.stat-change.up{background:rgba(0,255,136,0.1);color:var(--green);}
.stat-change.pending{background:rgba(255,184,0,0.1);color:var(--gold);}
.stat-num{font-family:'Clash Display',sans-serif;font-size:28px;font-weight:700;margin-bottom:4px;}
.stat-label{font-size:12px;color:var(--gray);}
.filters{display:flex;align-items:center;gap:10px;margin-bottom:20px;flex-wrap:wrap;}
.filter-btn{background:var(--bg2);border:1px solid var(--border);color:rgba(255,255,255,0.4);padding:7px 16px;border-radius:8px;font-size:12px;cursor:pointer;transition:all 0.2s;font-family:'Satoshi',sans-serif;}
.filter-btn:hover{border-color:rgba(0,212,255,0.3);color:var(--white);}
.filter-btn.active{background:var(--blue2);border-color:rgba(0,212,255,0.3);color:var(--blue);}
.search-box{margin-left:auto;display:flex;align-items:center;gap:8px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:7px 14px;}
.search-box input{background:none;border:none;outline:none;color:var(--white);font-family:'Satoshi',sans-serif;font-size:13px;width:180px;}
.search-box input::placeholder{color:var(--gray);}
.campaigns-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px;}
.campaign-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;overflow:hidden;transition:all 0.3s;cursor:pointer;}
.campaign-card:hover{border-color:rgba(0,212,255,0.25);transform:translateY(-2px);box-shadow:0 12px 40px rgba(0,0,0,0.4);}
.campaign-card.selected{border-color:rgba(0,212,255,0.5);}
.card-header{padding:16px 18px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);}
.card-client{display:flex;align-items:center;gap:10px;}
.client-avatar{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-family:'Clash Display',sans-serif;font-size:13px;font-weight:700;flex-shrink:0;}
.client-name{font-size:13px;font-weight:600;}
.client-niche{font-size:11px;color:var(--gray);margin-top:1px;}
.card-status{display:flex;align-items:center;gap:6px;font-size:11px;padding:5px 10px;border-radius:6px;font-weight:600;}
.status-pending{background:rgba(255,184,0,0.1);color:var(--gold);}
.status-approved{background:rgba(0,255,136,0.1);color:var(--green);}
.status-posted{background:rgba(0,212,255,0.1);color:var(--blue);}
.status-rejected{background:rgba(255,68,68,0.1);color:var(--red);}
.status-dot{width:6px;height:6px;border-radius:50%;background:currentColor;}
</style>

.acc-chip .dot{width:5px;height:5px;border-radius:50%;background:var(--green);}
.card-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:14px 18px;border-top:1px solid var(--border);}
.action-btn{padding:9px;border-radius:8px;border:none;font-family:'Satoshi',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;justify-content:center;gap:6px;}
.btn-approve{background:rgba(0,255,136,0.1);color:var(--green);border:1px solid rgba(0,255,136,0.2);}
.btn-approve:hover{background:rgba(0,255,136,0.2);}
.btn-reject{background:rgba(255,68,68,0.08);color:var(--red);border:1px solid rgba(255,68,68,0.15);}
.btn-reject:hover{background:rgba(255,68,68,0.15);}
.btn-edit{background:rgba(255,184,0,0.08);color:var(--gold);border:1px solid rgba(255,184,0,0.15);}
.btn-post{background:var(--blue);color:var(--bg);border:1px solid var(--blue);grid-column:1/-1;}
.btn-post:hover{opacity:0.85;}
.detail-panel{position:fixed;right:0;top:0;bottom:0;width:420px;background:var(--bg2);border-left:1px solid var(--border);transform:translateX(100%);transition:transform 0.4s cubic-bezier(0.4,0,0.2,1);z-index:100;overflow-y:auto;}
.detail-panel.open{transform:translateX(0);}
.detail-header{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--bg2);z-index:2;}
.detail-title{font-family:'Clash Display',sans-serif;font-size:16px;font-weight:700;}
.close-btn{width:32px;height:32px;border-radius:8px;background:var(--bg3);border:1px solid var(--border);color:var(--gray);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;transition:all 0.2s;}
.close-btn:hover{color:var(--white);}
.detail-body{padding:24px;}
.detail-section{margin-bottom:24px;}
.detail-section-title{font-size:11px;letter-spacing:0.15em;text-transform:uppercase;color:var(--gray);margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.detail-section-title::after{content:'';flex:1;height:1px;background:var(--border);}
.detail-caption-box{background:var(--bg3);border-radius:10px;padding:16px;}
.detail-caption-full{font-size:13px;line-height:1.8;color:rgba(255,255,255,0.7);}
.detail-hashtags{margin-top:12px;display:flex;flex-wrap:wrap;gap:6px;}
.detail-hashtag{font-size:11px;color:var(--blue);background:rgba(0,212,255,0.06);padding:3px 10px;border-radius:6px;}
.accounts-list{display:flex;flex-direction:column;gap:8px;}

.account-handle{font-size:12px;font-weight:500;}
.account-followers{font-size:11px;color:var(--gray);}
.account-toggle{width:40px;height:22px;background:var(--green);border-radius:11px;position:relative;cursor:pointer;transition:background 0.2s;}
.account-toggle::after{content:'';position:absolute;top:3px;right:3px;width:16px;height:16px;background:white;border-radius:50%;transition:right 0.2s;}
.account-toggle.off{background:var(--gray2);}
.account-toggle.off::after{right:auto;left:3px;}
.detail-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:8px;}
.detail-btn{padding:12px;border-radius:10px;border:none;font-family:'Satoshi',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;justify-content:center;gap:8px;}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:#1a1a1a;border:1px solid var(--border);border-radius:10px;padding:12px 24px;font-size:13px;z-index:200;transition:transform 0.3s;white-space:nowrap;}

.toast.success{border-color:rgba(0,255,136,0.3);color:var(--green);}
.toast.error{border-color:rgba(255,68,68,0.3);color:var(--red);}

.empty-icon{font-size:48px;margin-bottom:16px;}

  .content{padding:16px;}
  .topbar{padding:16px;}
  .campaigns-grid{grid-template-columns:1fr;}
  .detail-panel{width:100%;}
}<body>

let currentFilter='all', currentSearch='', currentCampaign=null;

function renderCampaigns() {
  const grid = document.getElementById('campaignsGrid');
  let filtered = campaigns.filter(c => {
    const mf = currentFilter==='all' || c.status===currentFilter || c.type===currentFilter;
    const ms = !currentSearch || c.client.toLowerCase().includes(currentSearch) || c.niche.toLowerCase().includes(currentSearch);
    return mf && ms;
  });
  if (!filtered.length) { grid.innerHTML=`<div class="empty-state" style="grid-column:1/-1"><div class="empty-icon">📭</div><div class="empty-title">No campaigns found</div></div>`; return; }
  grid.innerHTML = filtered.map(c => `
    <div class="campaign-card ${currentCampaign?.id===c.id?'selected':''}" onclick="openDetail(${c.id})">
      <div class="card-header">
        <div class="card-client">
          <div class="client-avatar" style="background:${c.avatarColor}">${c.avatarLetter}</div>
          <div><div class="client-name">${c.client}</div><div class="client-niche">${c.niche}</div></div>
        </div>
        <div class="card-status status-${c.status}"><div class="status-dot"></div>${c.status.charAt(0).toUpperCase()+c.status.slice(1)}</div>
      </div>
      <div class="card-preview">
        <div class="preview-type"><span class="type-badge type-${c.type}">${typeLabel(c.type)}</span><span class="preview-time">${c.time}</span></div>
        ${renderMediaPreview(c)}
        <div class="caption-preview">
          <div class="caption-text">${c.caption}</div>
          <div class="hashtags">${c.hashtags.slice(0,5).map(h=>`<span class="hashtag">${h}</span>`).join('')}${c.hashtags.length>5?`<span class="hashtag">+${c.hashtags.length-5}</span>`:''}</div>
        </div>
        <div class="accounts-row"><span class="accounts-label">Post to:</span>${c.accounts.filter(a=>a.on).map(a=>`<span class="acc-chip"><span class="dot"></span>${a.platform} ${a.handle}</span>`).join('')}</div>
      </div>
      <div class="card-actions">
        ${c.status==='pending'?`
          <button class="action-btn btn-approve" onclick="event.stopPropagation();approveCampaign(${c.id})">✓ Approve</button>
          <button class="action-btn btn-reject" onclick="event.stopPropagation();rejectCampaign(${c.id})">✗ Reject</button>
          <button class="action-btn btn-post" onclick="event.stopPropagation();openDetail(${c.id})">👁 View Full</button>
        `:c.status==='approved'?`
          <button class="action-btn btn-edit" onclick="event.stopPropagation();showToast('Edit coming soon','success')">✏️ Edit</button>
          <button class="action-btn btn-reject" onclick="event.stopPropagation();rejectCampaign(${c.id})">✗ Reject</button>
          <button class="action-btn btn-post" onclick="event.stopPropagation();postCampaign(${c.id})">🚀 Post Now</button>
        `:`<button class="action-btn btn-approve" style="grid-column:1/-1" onclick="event.stopPropagation();approveCampaign(${c.id})">↩ Re-approve</button>`}
      </div>
    </div>`).join('');
}

function typeLabel(t){return{banner:'🖼️ Banner',video:'🎬 Video',caption:'💬 Caption',all:'✨ Full Package'}[t]||t;}

function renderMediaPreview(c){
  if(c.type==='video') return `<div class="media-preview"><div class="media-video" style="background:${c.videoThumb}"><div class="video-play">${c.videoEmoji}</div><div class="video-label">Generated Reel</div><div class="video-duration">0:30</div></div></div>`;
  if(c.bannerStyle) return `<div class="media-preview"><div class="media-banner" style="background:${c.bannerStyle.bg}"><div class="banner-content"><div class="banner-title" style="color:${c.bannerStyle.accent}">${c.bannerStyle.title}</div><div class="banner-sub" style="color:rgba(255,255,255,0.6)">${c.bannerStyle.sub}</div><span class="banner-cta" style="background:${c.bannerStyle.ctaBg};color:${c.bannerStyle.ctaColor}">${c.bannerStyle.cta}</span></div></div></div>`;
  return '';
}
