<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>1NONLY Admin</title>
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#080808">
<link href="https://fonts.googleapis.com/css2?family=Clash+Display:wght@600;700&family=Satoshi:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--bg:#080808;--bg2:#0f0f0f;--bg3:#141414;--blue:#00D4FF;--green:#00FF88;--red:#FF4444;--gold:#FFB800;--white:#F0F0F0;--gray:#555;--border:rgba(255,255,255,0.06);}
body{background:var(--bg);color:var(--white);font-family:"Satoshi",sans-serif;min-height:100vh;}
.sidebar{width:220px;background:var(--bg2);border-right:1px solid var(--border);position:fixed;top:0;bottom:0;display:flex;flex-direction:column;padding:24px 0;z-index:50;}
.logo{padding:0 20px 24px;border-bottom:1px solid var(--border);margin-bottom:20px;}
.logo-text{font-family:"Clash Display",sans-serif;font-size:20px;font-weight:700;letter-spacing:.1em;}
.logo-text span{color:var(--blue);}
.logo-sub{font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:var(--gray);margin-top:4px;}
.nav{padding:0 12px;}
.nav-lbl{font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:var(--gray);padding:0 8px;margin-bottom:8px;}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;cursor:pointer;font-size:13px;color:rgba(255,255,255,0.5);margin-bottom:2px;transition:all .2s;}
.nav-item:hover{background:rgba(255,255,255,0.04);color:var(--white);}
.nav-item.active{background:rgba(0,212,255,0.1);color:var(--blue);border:1px solid rgba(0,212,255,0.15);}
.badge{margin-left:auto;background:var(--red);color:#fff;font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;}
.badge.b{background:var(--blue);color:#000;}
.sb-bot{margin-top:auto;padding:16px 12px;border-top:1px solid var(--border);}
.admin{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;background:rgba(255,255,255,0.03);}
.av{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--blue),#0088aa);display:flex;align-items:center;justify-content:center;font-family:"Clash Display",sans-serif;font-size:12px;font-weight:700;color:#000;}
.main{margin-left:220px;min-height:100vh;}
.topbar{padding:20px 28px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--bg2);position:sticky;top:0;z-index:40;}
.topbar h1{font-family:"Clash Display",sans-serif;font-size:18px;font-weight:700;}
.topbar p{font-size:12px;color:var(--gray);margin-top:2px;}
.tbtn{background:var(--bg3);border:1px solid var(--border);color:var(--white);padding:9px 16px;border-radius:8px;font-size:13px;cursor:pointer;transition:all .2s;}
.tbtn:hover{border-color:rgba(0,212,255,0.3);color:var(--blue);}
.tbtn.p{background:var(--blue);color:#000;border-color:var(--blue);font-weight:600;}
.content{padding:24px 28px;}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px;}
.sc{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:18px 20px;}
.sc-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;}
.si{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;}
.si.b{background:rgba(0,212,255,0.1);}
.si.g{background:rgba(0,255,136,0.1);}
.si.gold{background:rgba(255,184,0,0.1);}
.chg{font-size:11px;padding:3px 8px;border-radius:6px;font-weight:600;}
.chg.up{background:rgba(0,255,136,0.1);color:var(--green);}
.chg.pend{background:rgba(255,184,0,0.1);color:var(--gold);}
.sn{font-family:"Clash Display",sans-serif;font-size:26px;font-weight:700;margin-bottom:3px;}
.sl{font-size:12px;color:var(--gray);}
.filters{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap;align-items:center;}
.fb{background:var(--bg2);border:1px solid var(--border);color:rgba(255,255,255,0.4);padding:7px 14px;border-radius:8px;font-size:12px;cursor:pointer;transition:all .2s;}
.fb:hover{border-color:rgba(0,212,255,0.3);color:var(--white);}
.fb.active{background:rgba(0,212,255,0.1);border-color:rgba(0,212,255,0.3);color:var(--blue);}
.search{margin-left:auto;display:flex;align-items:center;gap:8px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:7px 12px;}
.search input{background:none;border:none;outline:none;color:var(--white);font-size:13px;width:160px;}
.search input::placeholder{color:var(--gray);}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:14px;}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;overflow:hidden;cursor:pointer;transition:all .3s;}
.card:hover{border-color:rgba(0,212,255,0.25);transform:translateY(-2px);}
.card.sel{border-color:rgba(0,212,255,0.5);}
.ch{padding:14px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);}
.cav{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-family:"Clash Display",sans-serif;font-size:13px;font-weight:700;flex-shrink:0;}
.cn{font-size:13px;font-weight:600;margin-left:10px;}
.cni{font-size:11px;color:var(--gray);margin-left:10px;margin-top:1px;}
.cs{display:flex;align-items:center;gap:5px;font-size:11px;padding:4px 9px;border-radius:6px;font-weight:600;}
.cs.pending{background:rgba(255,184,0,0.1);color:var(--gold);}
.cs.approved{background:rgba(0,255,136,0.1);color:var(--green);}
.cs.posted{background:rgba(0,212,255,0.1);color:var(--blue);}
.cs.rejected{background:rgba(255,68,68,0.1);color:var(--red);}
.dot{width:5px;height:5px;border-radius:50%;background:currentColor;}
.cp{padding:12px 16px;}
.pt{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.tb{font-size:10px;letter-spacing:.08em;text-transform:uppercase;padding:3px 9px;border-radius:5px;font-weight:600;}
.tb.banner{background:rgba(255,184,0,0.1);color:var(--gold);}
.tb.video{background:rgba(255,68,68,0.1);color:#ff7777;}
.tb.caption{background:rgba(0,212,255,0.1);color:var(--blue);}
.tb.all{background:rgba(0,255,136,0.1);color:var(--green);}
.pt-time{font-size:11px;color:var(--gray);margin-left:auto;}
.mp{background:var(--bg3);border-radius:9px;overflow:hidden;margin-bottom:10px;}
.mb{height:120px;display:flex;align-items:center;justify-content:center;position:relative;}
.mbc{text-align:center;padding:12px;z-index:2;position:relative;}
.mbt{font-family:"Clash Display",sans-serif;font-size:16px;font-weight:700;margin-bottom:4px;}
.mbs{font-size:10px;opacity:.6;}
.mbcta{display:inline-block;margin-top:8px;padding:5px 14px;border-radius:16px;font-size:10px;font-weight:700;}
.mv{height:120px;display:flex;align-items:center;justify-content:center;position:relative;}
.mvp{width:44px;height:44px;background:rgba(255,255,255,0.15);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;}
.mvl{position:absolute;bottom:7px;left:10px;font-size:9px;color:rgba(255,255,255,0.4);}
.mvd{position:absolute;bottom:7px;right:10px;font-size:9px;background:rgba(0,0,0,0.5);padding:1px 5px;border-radius:3px;}
.cprev{background:var(--bg3);border-radius:9px;padding:10px;margin-bottom:10px;}
.cptxt{font-size:11px;line-height:1.6;color:rgba(255,255,255,0.65);display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;}
.tags{margin-top:6px;display:flex;flex-wrap:wrap;gap:3px;}
.tag{font-size:10px;color:var(--blue);opacity:.8;}
.accs{display:flex;align-items:center;gap:5px;margin-bottom:10px;flex-wrap:wrap;}
.al{font-size:11px;color:var(--gray);margin-right:3px;}
.ac{display:flex;align-items:center;gap:4px;background:var(--bg3);border:1px solid var(--border);border-radius:5px;padding:3px 8px;font-size:10px;color:rgba(255,255,255,0.6);}
.acd{width:4px;height:4px;border-radius:50%;background:var(--green);}
.ca{display:grid;grid-template-columns:1fr 1fr;gap:7px;padding:12px 16px;border-top:1px solid var(--border);}
.ab{padding:8px;border-radius:7px;border:none;font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;transition:all .2s;}
.ab.app{background:rgba(0,255,136,0.1);color:var(--green);border:1px solid rgba(0,255,136,0.2);}
.ab.rej{background:rgba(255,68,68,0.08);color:var(--red);border:1px solid rgba(255,68,68,0.15);}
.ab.edt{background:rgba(255,184,0,0.08);color:var(--gold);border:1px solid rgba(255,184,0,0.15);}
.ab.pst{background:var(--blue);color:#000;border:1px solid var(--blue);grid-column:1/-1;}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:99;opacity:0;visibility:hidden;transition:all .3s;}
.overlay.open{opacity:1;visibility:visible;}
.panel{position:fixed;right:0;top:0;bottom:0;width:400px;background:var(--bg2);border-left:1px solid var(--border);transform:translateX(100%);transition:transform .4s cubic-bezier(.4,0,.2,1);z-index:100;overflow-y:auto;}
.panel.open{transform:translateX(0);}
.ph{padding:18px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--bg2);z-index:2;}
.pt2{font-family:"Clash Display",sans-serif;font-size:15px;font-weight:700;}
.xbtn{width:30px;height:30px;border-radius:7px;background:var(--bg3);border:1px solid var(--border);color:var(--gray);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;}
.pb{padding:22px;}
.ps{margin-bottom:22px;}
.pst2{font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:var(--gray);margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.pst2::after{content:"";flex:1;height:1px;background:var(--border);}
.pcb{background:var(--bg3);border-radius:9px;padding:14px;}
.pct{font-size:13px;line-height:1.8;color:rgba(255,255,255,0.65);}
.pht{margin-top:10px;display:flex;flex-wrap:wrap;gap:5px;}
.ph2{font-size:11px;color:var(--blue);background:rgba(0,212,255,0.06);padding:2px 9px;border-radius:5px;}
.pal{display:flex;flex-direction:column;gap:7px;}
.pai{display:flex;align-items:center;justify-content:space-between;background:var(--bg3);border-radius:7px;padding:9px 12px;}
.paf{display:flex;align-items:center;gap:9px;}
.pah{font-size:12px;font-weight:500;}
.paf2{font-size:11px;color:var(--gray);}
.tog{width:38px;height:20px;background:var(--green);border-radius:10px;position:relative;cursor:pointer;transition:background .2s;}
.tog::after{content:"";position:absolute;top:2px;right:2px;width:16px;height:16px;background:#fff;border-radius:50%;transition:right .2s;}
.tog.off{background:var(--gray);}
.tog.off::after{right:auto;left:2px;}
.pda{display:grid;grid-template-columns:1fr 1fr;gap:9px;}
.pdb{padding:11px;border-radius:9px;border:none;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;transition:all .2s;}
.pdb.app{background:rgba(0,255,136,0.1);color:var(--green);border:1px solid rgba(0,255,136,0.2);}
.pdb.rej{background:rgba(255,68,68,0.08);color:var(--red);border:1px solid rgba(255,68,68,0.15);}
.pdb.pst{background:var(--blue);color:#000;border:1px solid var(--blue);grid-column:1/-1;font-size:14px;padding:13px;}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(80px);background:#1a1a1a;border:1px solid var(--border);border-radius:9px;padding:10px 22px;font-size:13px;z-index:200;transition:transform .3s;white-space:nowrap;}
.toast.show{transform:translateX(-50%) translateY(0);}
.toast.s{border-color:rgba(0,255,136,0.3);color:var(--green);}
.toast.e{border-color:rgba(255,68,68,0.3);color:var(--red);}
@media(max-width:768px){.sidebar{display:none;}.main{margin-left:0;}.stats{grid-template-columns:1fr 1fr;}.content{padding:16px;}.topbar{padding:14px 16px;}.panel{width:100%;}}
</style>
</head>
<body>
<div class="sidebar">
  <div class="logo">
    <div class="logo-text">1N<span>ONLY</span></div>
    <div class="logo-sub">Admin Dashboard</div>
  </div>
  <div class="nav">
    <div class="nav-lbl">Main</div>
    <div class="nav-item active">📋 Campaigns <span class="badge">3</span></div>
    <div class="nav-item">✅ Approved</div>
    <div class="nav-item">🚀 Posted</div>
    <div class="nav-item">❌ Rejected</div>
    <br>
    <div class="nav-lbl">Management</div>
    <div class="nav-item">👥 Clients</div>
    <div class="nav-item">📱 Accounts <span class="badge b">5</span></div>
    <div class="nav-item">📊 Analytics</div>
    <div class="nav-item">⚙️ Settings</div>
  </div>
  <div class="sb-bot">
    <div class="admin">
      <div class="av">A</div>
      <div>
        <div style="font-size:12px;font-weight:500;">Admin</div>
        <div style="font-size:10px;color:var(--gray);">1NONLY Owner</div>
      </div>
    </div>
  </div>
</div>

<div class="main">
  <div class="topbar">
    <div>
      <h1>Campaign Review</h1>
      <p>Review and approve client campaigns</p>
    </div>
    <div style="display:flex;gap:10px;">
      <button class="tbtn">🔔</button>
      <button class="tbtn p" onclick="toast('New campaign sent!','s')">+ New</button>
    </div>
  </div>
  <div class="content">
    <div class="stats">
      <div class="sc"><div class="sc-top"><div class="si b">📋</div><span class="chg pend">3 new</span></div><div class="sn">3</div><div class="sl">Pending</div></div>
      <div class="sc"><div class="sc-top"><div class="si g">✅</div><span class="chg up">+12</span></div><div class="sn">47</div><div class="sl">Approved</div></div>
      <div class="sc"><div class="sc-top"><div class="si b">🚀</div><span class="chg up">+8%</span></div><div class="sn">38</div><div class="sl">Posted</div></div>
      <div class="sc"><div class="sc-top"><div class="si gold">👥</div><span class="chg up">+2</span></div><div class="sn">12</div><div class="sl">Clients</div></div>
    </div>
    <div class="filters">
      <button class="fb active" onclick="filter('all',this)">All</button>
      <button class="fb" onclick="filter('pending',this)">⏳ Pending</button>
      <button class="fb" onclick="filter('approved',this)">✅ Approved</button>
      <button class="fb" onclick="filter('banner',this)">🖼️ Banner</button>
      <button class="fb" onclick="filter('video',this)">🎬 Video</button>
      <div class="search"><span style="color:var(--gray)">🔍</span><input placeholder="Search..." oninput="search(this.value)"></div>
    </div>
    <div class="grid" id="grid"></div>
  </div>
</div>

<div class="overlay" id="overlay" onclick="closePanel()"></div>
<div class="panel" id="panel">
  <div class="ph"><div class="pt2" id="ptitle">Detail</div><button class="xbtn" onclick="closePanel()">✕</button></div>
  <div class="pb" id="pbody"></div>
</div>
<div class="toast" id="toast"></div>

<script>
var C=[
  {id:1,cl:"Alex R.",ni:"Crypto",av:"linear-gradient(135deg,#00D4FF,#0088aa)",al:"A",st:"pending",ty:"banner",ti:"2 min ago",rq:"Promote my Bitcoin trading course. Professional, trust-building.",bs:{bg:"linear-gradient(135deg,#0a0a1a,#001133)",ac:"#00D4FF",tt:"Master Bitcoin Trading",sb:"Learn proven strategies",cta:"Start Today",cb:"#00D4FF",cc:"#000"},cap:"The market never sleeps and neither does your opportunity to grow. Our Bitcoin Trading Course gives you the tools, strategy, and confidence to trade smarter. Join 2000+ students who have transformed their financial future.",ht:["#bitcoin","#crypto","#trading","#btc","#investing","#financialfreedom","#blockchain"],acc:[{pl:"📸",ha:"@crypto.ig",fo:"2.4K",on:true},{pl:"🎵",ha:"@crypto.tt",fo:"1.1K",on:true}]},
  {id:2,cl:"Maria K.",ni:"Fitness",av:"linear-gradient(135deg,#FF6B6B,#cc0044)",al:"M",st:"pending",ty:"video",ti:"18 min ago",rq:"12-week body transformation. Target women 25-40. Motivational vibe.",vb:"linear-gradient(135deg,#1a0510,#2d0a1a)",ve:"💪",cap:"Your transformation starts with one decision. In just 12 weeks our fitness program has helped hundreds of women reshape their bodies and feel unstoppable. No gym required.",ht:["#fitness","#transformation","#workout","#fitnessmotivation","#womenshealth","#bodygoals"],acc:[{pl:"📸",ha:"@fit.marcus.ig",fo:"1.8K",on:true},{pl:"🎵",ha:"@fitmarcus.tt",fo:"3.2K",on:true}]},
  {id:3,cl:"Tom B.",ni:"Fashion",av:"linear-gradient(135deg,#FFB800,#cc7700)",al:"T",st:"approved",ty:"all",ti:"1 hr ago",rq:"Summer collection drop. Luxury streetwear. Exclusive and premium.",bs:{bg:"linear-gradient(135deg,#0f0a00,#1a1000)",ac:"#FFB800",tt:"Summer Drop 2026",sb:"Exclusive luxury streetwear",cta:"Shop Now",cb:"#FFB800",cc:"#000"},cap:"This is not just clothing. This is a statement. Our Summer 2026 collection is limited and built for those who understand that style is a language. Only 50 pieces per design.",ht:["#fashion","#streetwear","#luxury","#summerdrop","#limitededition","#ootd","#designer"],acc:[{pl:"📸",ha:"@style.ig",fo:"4.1K",on:true},{pl:"🎵",ha:"@style.tt",fo:"2.8K",on:true}]}
];

var cf="all",cs="",cc=null;

function tl(t){return{banner:"🖼️ Banner",video:"🎬 Video",caption:"💬 Caption",all:"✨ Full"}[t]||t;}

function mp(c){
  if(c.ty==="video") return '<div class="mp"><div class="mv" style="background:'+c.vb+'"><div class="mvp">'+c.ve+'</div><div class="mvl">Generated Reel</div><div class="mvd">0:30</div></div></div>';
  if(c.bs) return '<div class="mp"><div class="mb" style="background:'+c.bs.bg+'"><div class="mbc"><div class="mbt" style="color:'+c.bs.ac+'">'+c.bs.tt+'</div><div class="mbs" style="color:rgba(255,255,255,0.6)">'+c.bs.sb+'</div><span class="mbcta" style="background:'+c.bs.cb+';color:'+c.bs.cc+'">'+c.bs.cta+'</span></div></div></div>';
  return "";
}

function render(){
  var d=C.filter(function(c){
    var mf=cf==="all"||c.st===cf||c.ty===cf;
    var ms=!cs||c.cl.toLowerCase().indexOf(cs)>-1||c.ni.toLowerCase().indexOf(cs)>-1;
    return mf&&ms;
  });
  var g=document.getElementById("grid");
  if(!d.length){
    g.innerHTML="<div style='grid-column:1/-1;text-align:center;padding:60px;color:#555'><div style='font-size:40px;margin-bottom:12px'>No campaigns</div></div>";
    return;
  }
  var html="";
  for(var i=0;i<d.length;i++){
    var c=d[i];
    var sel=(cc&&cc.id===c.id)?" sel":"";
    var status=c.st.charAt(0).toUpperCase()+c.st.slice(1);
    var acts="";
    if(c.st==="pending"){
      acts="<button class='ab app' onclick='event.stopPropagation();approve("+c.id+")'>✓ Approve</button>";
      acts+="<button class='ab rej' onclick='event.stopPropagation();reject("+c.id+")'>✗ Reject</button>";
      acts+="<button class='ab pst' onclick='event.stopPropagation();openPanel("+c.id+")'>👁 View Full</button>";
    } else if(c.st==="approved"){
      acts="<button class='ab edt' onclick='event.stopPropagation()'>✏️ Edit</button>";
      acts+="<button class='ab rej' onclick='event.stopPropagation();reject("+c.id+")'>✗ Reject</button>";
      acts+="<button class='ab pst' onclick='event.stopPropagation();post("+c.id+")'>🚀 Post Now</button>";
    } else {
      acts="<button class='ab app' style='grid-column:1/-1' onclick='event.stopPropagation();approve("+c.id+")'>↩ Re-approve</button>";
    }
    var tags="";
    for(var t=0;t<Math.min(5,c.ht.length);t++) tags+="<span class='tag'>"+c.ht[t]+"</span>";
    var accs="";
    for(var a=0;a<c.acc.length;a++){if(c.acc[a].on) accs+="<span class='ac'><span class='acd'></span>"+c.acc[a].pl+" "+c.acc[a].ha+"</span>";}
    html+="<div class='card"+sel+"' onclick='openPanel("+c.id+")'>";
    html+="<div class='ch'><div style='display:flex;align-items:center'>";
    html+="<div class='cav' style='background:"+c.av+"'>"+c.al+"</div>";
    html+="<div><div class='cn'>"+c.cl+"</div><div class='cni'>"+c.ni+"</div></div></div>";
    html+="<div class='cs "+c.st+"'><div class='dot'></div>"+status+"</div></div>";
    html+="<div class='cp'><div class='pt'><span class='tb "+c.ty+"'>"+tl(c.ty)+"</span><span class='pt-time'>"+c.ti+"</span></div>";
    html+=mp(c);
    html+="<div class='cprev'><div class='cptxt'>"+c.cap+"</div><div class='tags'>"+tags+"</div></div>";
    html+="<div class='accs'><span class='al'>Post to:</span>"+accs+"</div></div>";
    html+="<div class='ca'>"+acts+"</div></div>";
  }
  g.innerHTML=html;
}

function openPanel(id){
  var c=C.find(function(x){return x.id===id;});
  if(!c) return;
  cc=c;render();
  document.getElementById("ptitle").textContent=c.cl+" — "+tl(c.ty);
  var da="";
  if(c.st==="pending"||c.st==="rejected") da='<button class="pdb app" onclick="approve('+c.id+')">✓ Approve</button><button class="pdb rej" onclick="reject('+c.id+')">✗ Reject</button>';
  else da='<button class="pdb rej" onclick="reject('+c.id+')">✗ Reject</button><button class="pdb app" onclick="toast('Edit soon','s')">✏️ Edit</button>';
  document.getElementById("pbody").innerHTML='<div class="ps"><div class="pst2">Client Request</div><div style="background:var(--bg3);border-radius:9px;padding:12px;font-size:13px;line-height:1.7;color:rgba(255,255,255,0.6);font-style:italic">"'+c.rq+'"</div></div><div class="ps"><div class="pst2">Creative</div><div style="border-radius:10px;overflow:hidden">'+mp(c)+'</div></div><div class="ps"><div class="pst2">Caption & Hashtags</div><div class="pcb"><div class="pct">'+c.cap+'</div><div class="pht">'+c.ht.map(function(h){return'<span class="ph2">'+h+'</span>';}).join("")+'</div></div></div><div class="ps"><div class="pst2">Accounts</div><div class="pal">'+c.acc.map(function(a,i){return'<div class="pai"><div class="paf"><span style="font-size:14px">'+a.pl+'</span><div><div class="pah">'+a.ha+'</div><div class="paf2">'+a.fo+' followers</div></div></div><div class="tog '+(a.on?"":"off")+'" onclick="togAcc('+c.id+','+i+')"></div></div>';}).join("")+'</div></div><div class="ps"><div class="pst2">Actions</div><div class="pda">'+da+'<button class="pdb pst" onclick="post('+c.id+')">🚀 Approve & Post Now</button></div></div>';
  document.getElementById("panel").classList.add("open");
  document.getElementById("overlay").classList.add("open");
}

function closePanel(){document.getElementById("panel").classList.remove("open");document.getElementById("overlay").classList.remove("open");cc=null;render();}
function togAcc(cid,i){var c=C.find(function(x){return x.id===cid;});if(c){c.acc[i].on=!c.acc[i].on;openPanel(cid);}}
function approve(id){var c=C.find(function(x){return x.id===id;});if(c){c.st="approved";render();if(cc&&cc.id===id)openPanel(id);toast("Campaign approved!","s");}}
function reject(id){var c=C.find(function(x){return x.id===id;});if(c){c.st="rejected";render();if(cc&&cc.id===id)closePanel();toast("Campaign rejected","e");}}
function post(id){var c=C.find(function(x){return x.id===id;});if(c){c.st="posted";render();closePanel();toast("🚀 Posted to all accounts!","s");}}
function filter(f,btn){cf=f;document.querySelectorAll(".fb").forEach(function(b){b.classList.remove("active");});btn.classList.add("active");render();}
function search(v){cs=v.toLowerCase();render();}
function toast(msg,type){var t=document.getElementById("toast");t.textContent=msg;t.className="toast show "+type;setTimeout(function(){t.className="toast";},3000);}

render();
</script>
</body>
</html>
